<div class="scene comparison">
  {{#if data.title}}
  <h2 class="scene-title comparison__title">{{data.title}}</h2>
  {{/if}}
  <div class="comparison__columns">
    <div class="comparison__column comparison__left">
      <div class="comparison__label-badge">
        <h3 class="comparison__label">{{data.left.label}}</h3>
      </div>
      <ul class="comparison__list">
        {{#each data.left.items}}
        <li class="comparison__item comparison__item--left">
          <span class="comparison__item-bullet"></span>
          <span>{{this}}</span>
        </li>
        {{/each}}
      </ul>
    </div>
    <div class="comparison__divider">
      <div class="comparison__divider-dot"></div>
    </div>
    <div class="comparison__column comparison__right">
      <div class="comparison__label-badge">
        <h3 class="comparison__label">{{data.right.label}}</h3>
      </div>
      <ul class="comparison__list">
        {{#each data.right.items}}
        <li class="comparison__item comparison__item--right">
          <span class="comparison__item-bullet"></span>
          <span>{{this}}</span>
        </li>
        {{/each}}
      </ul>
    </div>
  </div>
</div>

<style>
  .comparison {
    align-items: flex-start;
    padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 10);
  }

  .comparison__title {
    margin-bottom: calc(var(--spacing-unit) * 4);
    align-self: center;
  }

  .comparison__columns {
    display: flex;
    width: 100%;
    gap: calc(var(--spacing-unit) * 4);
    align-items: flex-start;
  }

  .comparison__column {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing-unit) * 2);
  }

  .comparison__label-badge {
    padding-bottom: calc(var(--spacing-unit) * 1.5);
    border-bottom: 2px solid var(--accent);
    margin-bottom: calc(var(--spacing-unit) * 0.5);
  }

  .comparison__divider {
    width: 2px;
    align-self: stretch;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    opacity: 0.4;
    border-radius: 1px;
    position: relative;
    display: flex;
    justify-content: center;
  }

  .comparison__divider-dot {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .comparison__label {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  .comparison__list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing-unit) * 1.5);
  }

  .comparison__item {
    font-size: 1.1rem;
    color: var(--text-primary);
    padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 2.5);
    background: var(--glass-bg, var(--bg-secondary));
    backdrop-filter: blur(var(--glass-blur, 16px));
    -webkit-backdrop-filter: blur(var(--glass-blur, 16px));
    border: 1px solid var(--glass-border, rgba(255,255,255,0.06));
    border-radius: var(--border-radius-sm);
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: calc(var(--spacing-unit) * 1.5);
    box-shadow: var(--shadow-card);
  }

  .comparison__item-bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 8px;
  }
</style>

<script>
  window.__buildTimeline = function() {
    var tl = gsap.timeline({ paused: true });

    tl.from('.comparison__title', {
      y: 30,
      opacity: 0,
      duration: 0.4,
      ease: 'back.out(1.7)'
    });

    tl.from('.comparison__divider', {
      scaleY: 0,
      transformOrigin: 'center center',
      duration: 0.5,
      ease: 'power3.out'
    }, '-=0.1');

    tl.from('.comparison__divider-dot', {
      scale: 0,
      opacity: 0,
      duration: 0.3,
      ease: 'back.out(2)'
    }, '-=0.15');

    tl.from('.comparison__label-badge', {
      y: 15,
      opacity: 0,
      duration: 0.35,
      stagger: 0.15,
      ease: 'power2.out'
    }, '-=0.2');

    tl.from('.comparison__item--left', {
      x: -25,
      opacity: 0,
      duration: 0.35,
      stagger: 0.08,
      ease: 'back.out(1.2)'
    }, '-=0.1');

    tl.from('.comparison__item--right', {
      x: 25,
      opacity: 0,
      duration: 0.35,
      stagger: 0.08,
      ease: 'back.out(1.2)'
    }, '<');

    tl.to({}, { duration: 0.3 });
    return tl;
  };
</script>
