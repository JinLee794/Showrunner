<div class="scene code-terminal">
  {{#if data.title}}
  <div class="code-terminal__window-title">{{data.title}}</div>
  {{/if}}
  <div class="code-terminal__window">
    <div class="code-terminal__titlebar">
      <span class="code-terminal__dot code-terminal__dot--red"></span>
      <span class="code-terminal__dot code-terminal__dot--yellow"></span>
      <span class="code-terminal__dot code-terminal__dot--green"></span>
      <span class="code-terminal__titlebar-text">{{data.shell}}</span>
    </div>
    <div class="code-terminal__body">
      {{#each data.lines}}
      <div class="code-terminal__line code-terminal__line--{{this.kind}}">
        {{#if (eq this.kind 'prompt')}}<span class="code-terminal__prompt-symbol">❯</span>{{/if}}
        {{#if (eq this.kind 'comment')}}<span class="code-terminal__comment-symbol">#</span>{{/if}}
        <span class="code-terminal__text">{{{this.text}}}</span>
      </div>
      {{/each}}
      <div class="code-terminal__cursor"></div>
    </div>
  </div>
</div>

<style>
  .code-terminal {
    padding: calc(var(--spacing-unit) * 6) calc(var(--spacing-unit) * 10);
    background: var(--bg-primary);
  }

  .code-terminal__window-title {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    color: var(--text-secondary);
    margin-bottom: calc(var(--spacing-unit) * 2);
    text-align: center;
    font-weight: 500;
  }

  .code-terminal__window {
    width: 100%;
    max-width: 1200px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 12px 60px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(255,255,255,0.06),
      0 0 40px rgba(122, 162, 247, 0.06);
    background: #1a1b26;
  }

  .code-terminal__titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    background: linear-gradient(180deg, #1d1e2a, #16171f);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .code-terminal__dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .code-terminal__dot--red { background: #ff5f57; }
  .code-terminal__dot--yellow { background: #febc2e; }
  .code-terminal__dot--green { background: #28c840; }

  .code-terminal__titlebar-text {
    color: #565869;
    font-size: 0.85rem;
    font-family: var(--font-mono);
    margin-left: 8px;
  }

  .code-terminal__body {
    padding: calc(var(--spacing-unit) * 3) calc(var(--spacing-unit) * 3);
    font-family: 'Cascadia Code', 'SF Mono', 'Fira Code', monospace;
    font-size: 1.05rem;
    line-height: 1.7;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .code-terminal__line {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .code-terminal__line--prompt {
    color: #c0caf5;
  }

  .code-terminal__line--output {
    color: #565f89;
    padding-left: 22px;
  }

  .code-terminal__line--comment {
    color: #565f89;
    font-style: italic;
  }

  .code-terminal__line--success {
    color: #9ece6a;
    padding-left: 22px;
  }

  .code-terminal__line--error {
    color: #f7768e;
    padding-left: 22px;
  }

  .code-terminal__line--highlight {
    color: #7aa2f7;
    padding-left: 22px;
  }

  .code-terminal__line--blank {
    height: 1.7em;
  }

  .code-terminal__prompt-symbol {
    color: #7aa2f7;
    font-weight: 700;
    flex-shrink: 0;
  }

  .code-terminal__comment-symbol {
    color: #565f89;
    flex-shrink: 0;
  }

  .code-terminal__text .accent {
    color: #bb9af7;
  }

  .code-terminal__text .string {
    color: #9ece6a;
  }

  .code-terminal__text .keyword {
    color: #7aa2f7;
  }

  .code-terminal__text .number {
    color: #ff9e64;
  }

  .code-terminal__text .dim {
    color: #565f89;
  }

  .code-terminal__cursor {
    display: inline-block;
    width: 8px;
    height: 1.2em;
    background: #7aa2f7;
    margin-left: 22px;
    opacity: 0;
    border-radius: 1px;
  }
</style>

<script>
  window.__buildTimeline = function() {
    var tl = gsap.timeline({ paused: true });

    // Window slides in
    tl.from('.code-terminal__window', {
      y: 30,
      opacity: 0,
      scale: 0.97,
      duration: 0.4,
      ease: 'back.out(1.4)'
    });

    // Title bar dots appear
    tl.from('.code-terminal__dot', {
      scale: 0,
      duration: 0.2,
      stagger: 0.05,
      ease: 'back.out(2)'
    }, '-=0.1');

    // Window title if present
    var winTitle = document.querySelector('.code-terminal__window-title');
    if (winTitle) {
      tl.from(winTitle, {
        y: -10,
        opacity: 0,
        duration: 0.3,
        ease: 'power2.out'
      }, '<');
    }

    // Lines appear one by one with typing feel
    var lines = document.querySelectorAll('.code-terminal__line');
    lines.forEach(function(line, i) {
      var isPrompt = line.classList.contains('code-terminal__line--prompt');
      var isBlank = line.classList.contains('code-terminal__line--blank');
      
      if (isBlank) {
        tl.from(line, { opacity: 0, duration: 0.05 }, '+=0.05');
      } else if (isPrompt) {
        // Prompts "type in" — slide from left with a slight delay
        tl.from(line, {
          opacity: 0,
          x: -5,
          duration: 0.25,
          ease: 'power2.out'
        }, '+=0.15');
      } else {
        // Output appears quickly after prompt
        tl.from(line, {
          opacity: 0,
          duration: 0.15,
          ease: 'power2.out'
        }, '+=0.03');
      }
    });

    // Cursor blink at the end
    tl.to('.code-terminal__cursor', {
      opacity: 1,
      duration: 0.01
    });
    tl.to('.code-terminal__cursor', {
      opacity: 0,
      duration: 0.3,
      ease: 'steps(1)',
      yoyo: true,
      repeat: 3
    });

    tl.to({}, { duration: 0.2 });
    return tl;
  };
</script>
