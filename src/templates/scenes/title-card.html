<div class="scene title-card bg-grid">
  <div class="title-card__orb title-card__orb--1"></div>
  <div class="title-card__orb title-card__orb--2"></div>
  {{#if data.image}}
  <img class="title-card__image" src="{{{data.image}}}" alt="" />
  {{else}}
  <div class="title-card__logo accent-line"></div>
  {{/if}}
  <h1 class="title-card__title">{{data.title}}</h1>
  {{#if data.subtitle}}
  <p class="title-card__subtitle">{{data.subtitle}}</p>
  {{/if}}
  <div class="title-card__divider"></div>
  {{#if data.date}}
  <p class="title-card__date">{{data.date}}</p>
  {{/if}}
  {{#if data.presenter}}
  <p class="title-card__presenter">{{data.presenter}}</p>
  {{/if}}
</div>

<style>
  .title-card {
    text-align: center;
    background: linear-gradient(160deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
    gap: calc(var(--spacing-unit) * 2);
  }

  .title-card__orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  .title-card__orb--1 {
    width: 400px;
    height: 400px;
    background: var(--accent);
    opacity: 0.06;
    top: -10%;
    right: -5%;
  }

  .title-card__orb--2 {
    width: 300px;
    height: 300px;
    background: var(--accent-tertiary, var(--accent-secondary));
    opacity: 0.05;
    bottom: -5%;
    left: -5%;
  }

  .title-card__logo {
    width: 80px;
    height: 4px;
    margin-bottom: calc(var(--spacing-unit) * 3);
    background: var(--accent-gradient);
  }

  .title-card__image {
    max-width: 400px;
    max-height: 300px;
    object-fit: contain;
    margin-bottom: calc(var(--spacing-unit) * 4);
    filter: drop-shadow(0 6px 32px rgba(0,0,0,0.35));
  }

  .title-card__title {
    font-family: var(--font-heading);
    font-size: 3.8rem;
    font-weight: 700;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.08;
    max-width: 85%;
    letter-spacing: -0.02em;
  }

  .title-card__subtitle {
    font-size: 1.5rem;
    color: var(--text-secondary);
    font-weight: 400;
    max-width: 70%;
    line-height: 1.4;
  }

  .title-card__divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
    margin: calc(var(--spacing-unit) * 1) 0;
  }

  .title-card__date {
    font-size: 1rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-top: calc(var(--spacing-unit) * 1);
    letter-spacing: 0.04em;
  }

  .title-card__presenter {
    font-size: 1.1rem;
    color: var(--text-secondary);
    font-weight: 500;
  }
</style>

<script>
  window.__buildTimeline = function() {
    const tl = gsap.timeline({ paused: true });
    const anim = window.__anim || {};
    const ease = window.__getEase ? window.__getEase('back.out(1.4)') : 'back.out(1.4)';

    // Orbs drift in
    tl.from('.title-card__orb--1', {
      scale: 0.3,
      opacity: 0,
      x: 50,
      duration: 0.8,
      ease: 'power2.out'
    }, 0);
    tl.from('.title-card__orb--2', {
      scale: 0.3,
      opacity: 0,
      x: -50,
      duration: 0.8,
      ease: 'power2.out'
    }, 0.1);

    if (document.querySelector('.title-card__image')) {
      tl.from('.title-card__image', {
        scale: 0.5,
        opacity: 0,
        transformOrigin: 'center center',
        duration: 0.6,
        ease: 'back.out(1.7)'
      }, 0.2);
    } else {
      tl.from('.title-card__logo', {
        scaleX: 0,
        opacity: 0,
        transformOrigin: 'center center',
        duration: 0.4,
        ease: 'power3.out'
      }, 0.2);
    }

    // Title — use text effect if specified
    var titleEl = document.querySelector('.title-card__title');
    if (titleEl && anim.textEffect && window.__textEffect) {
      tl.add(window.__textEffect(titleEl, anim.textEffect, { ease: ease }), '-=0.15');
    } else {
      tl.from('.title-card__title', {
        y: 40,
        opacity: 0,
        duration: 0.6,
        ease: ease
      }, '-=0.15');
    }

    tl.from('.title-card__subtitle', {
      y: 25,
      opacity: 0,
      duration: 0.5,
      ease: 'power2.out'
    }, '-=0.25')
    .from('.title-card__divider', {
      scaleX: 0,
      transformOrigin: 'center center',
      duration: 0.4,
      ease: 'power3.out'
    }, '-=0.2')
    .from('.title-card__date', {
      opacity: 0,
      y: 8,
      duration: 0.3,
      ease: 'power2.out'
    }, '-=0.1')
    .from('.title-card__presenter', {
      y: 10,
      opacity: 0,
      duration: 0.3,
      ease: 'power2.out'
    }, '-=0.1');

    // Hold — proportional to entrance
    var holdDuration = Math.max(0.8, tl.duration() * 0.5);
    tl.to({}, { duration: holdDuration });

    // Exit animation
    if (window.__buildExit) tl.add(window.__buildExit());

    return tl;
  };
</script>
