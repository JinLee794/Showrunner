<div class="scene title-card">
  <div class="title-card__logo accent-line"></div>
  <h1 class="title-card__title">{{data.title}}</h1>
  {{#if data.subtitle}}
  <p class="title-card__subtitle">{{data.subtitle}}</p>
  {{/if}}
  {{#if data.date}}
  <p class="title-card__date">{{data.date}}</p>
  {{/if}}
  {{#if data.presenter}}
  <p class="title-card__presenter">{{data.presenter}}</p>
  {{/if}}
</div>

<style>
  .title-card {
    text-align: center;
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    gap: calc(var(--spacing-unit) * 2);
  }

  .title-card__logo {
    width: 80px;
    height: 4px;
    margin-bottom: calc(var(--spacing-unit) * 3);
  }

  .title-card__title {
    font-family: var(--font-heading);
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.1;
    max-width: 80%;
  }

  .title-card__subtitle {
    font-size: 1.5rem;
    color: var(--text-secondary);
    font-weight: 400;
    max-width: 70%;
  }

  .title-card__date {
    font-size: 1rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-top: calc(var(--spacing-unit) * 2);
  }

  .title-card__presenter {
    font-size: 1.1rem;
    color: var(--text-secondary);
  }
</style>

<script>
  window.__buildTimeline = function() {
    const tl = gsap.timeline({ paused: true });

    tl.from('.title-card__logo', {
      scaleX: 0,
      transformOrigin: 'center center',
      duration: 0.3,
      ease: 'power3.out'
    })
    .from('.title-card__title', {
      y: 30,
      opacity: 0,
      duration: 0.5,
      ease: 'back.out(1.7)'
    }, '-=0.1')
    .from('.title-card__subtitle', {
      y: 20,
      opacity: 0,
      duration: 0.4,
      ease: 'power2.out'
    }, '-=0.2')
    .from('.title-card__date', {
      opacity: 0,
      duration: 0.3,
      ease: 'power2.out'
    }, '-=0.1')
    .from('.title-card__presenter', {
      y: 10,
      opacity: 0,
      duration: 0.3,
      ease: 'power2.out'
    }, '-=0.1')
    // Hold final state for remaining duration
    .to({}, { duration: 0.5 });

    return tl;
  };
</script>
