<div class="scene text-reveal">
  <div class="text-reveal__container">
    {{#if data.eyebrow}}
    <div class="text-reveal__eyebrow">{{data.eyebrow}}</div>
    {{/if}}
    <div class="text-reveal__headline">{{{data.headline}}}</div>
    {{#if data.body}}
    <div class="text-reveal__body">{{{data.body}}}</div>
    {{/if}}
    {{#if data.footnote}}
    <div class="text-reveal__footnote">{{data.footnote}}</div>
    {{/if}}
  </div>
  <div class="text-reveal__accent-line"></div>
</div>

<style>
  .text-reveal {
    background: linear-gradient(160deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
    padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 12);
  }

  .text-reveal__container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: calc(var(--spacing-unit) * 3);
    max-width: 900px;
  }

  .text-reveal__eyebrow {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    font-family: var(--font-mono);
  }

  .text-reveal__headline {
    font-family: var(--font-heading);
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .text-reveal__headline em,
  .text-reveal__headline strong {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: normal;
  }

  .text-reveal__body {
    font-size: 1.3rem;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 700px;
  }

  .text-reveal__body em,
  .text-reveal__body strong {
    color: var(--text-primary);
    font-weight: 700;
    font-style: normal;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .text-reveal__footnote {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }

  .text-reveal__accent-line {
    width: 80px;
    height: 3px;
    background: var(--accent-gradient);
    border-radius: 3px;
    margin-top: calc(var(--spacing-unit) * 2);
  }

  /* Highlight sweep for inline markup */
  .text-reveal__headline .sweep-highlight {
    background-image: linear-gradient(90deg, var(--accent) 0%, var(--accent) 100%);
    background-repeat: no-repeat;
    background-position: 0 88%;
    background-size: 0% 25%;
  }
</style>

<script>
  window.__buildTimeline = function() {
    var tl = gsap.timeline({ paused: true });
    var anim = window.__anim || {};
    var ease = window.__getEase ? window.__getEase('power3.out') : 'power3.out';
    var textEffect = anim.textEffect || 'word-reveal';

    // Optional initial delay
    if (anim.delay) {
      tl.to({}, { duration: anim.delay });
    }

    // Eyebrow — always a quick fade
    var eyebrow = document.querySelector('.text-reveal__eyebrow');
    if (eyebrow) {
      tl.from(eyebrow, {
        opacity: 0,
        y: -15,
        duration: 0.4,
        ease: 'power2.out'
      });
    }

    // Headline — apply the chosen text effect
    var headline = document.querySelector('.text-reveal__headline');
    if (headline && window.__textEffect) {
      tl.add(window.__textEffect(headline, textEffect, {
        ease: ease,
        stagger: anim.stagger,
        duration: (textEffect === 'counter') ? 2.0 : (textEffect === 'typewriter') ? undefined : 0.5,
        charDuration: 0.05,
        y: 30
      }), '-=0.1');
    } else if (headline) {
      tl.from(headline, { y: 50, opacity: 0, duration: 0.8, ease: ease });
    }

    // Body text — apply text effect if applicable
    var body = document.querySelector('.text-reveal__body');
    if (body) {
      var bodyEffect = (textEffect === 'fade-lines' || textEffect === 'word-reveal' || textEffect === 'typewriter')
        ? textEffect : null;
      if (bodyEffect && window.__textEffect) {
        tl.add(window.__textEffect(body, bodyEffect, { stagger: (anim.stagger || 0.1) * 1.2, charDuration: 0.04 }), '-=0.2');
      } else {
        tl.from(body, {
          y: 25,
          opacity: 0,
          duration: 0.6,
          ease: 'power2.out'
        }, '-=0.2');
      }
    }

    // Accent line expands
    tl.from('.text-reveal__accent-line', {
      scaleX: 0,
      transformOrigin: 'center center',
      duration: 0.5,
      ease: 'power3.out'
    }, '-=0.2');

    // Footnote
    var footnote = document.querySelector('.text-reveal__footnote');
    if (footnote) {
      tl.from(footnote, {
        opacity: 0,
        y: 10,
        duration: 0.4,
        ease: 'power2.out'
      }, '-=0.1');
    }

    // Hold — proportional to entrance so scrubbing stays balanced
    var holdDuration = Math.max(0.8, tl.duration() * 0.5);
    tl.to({}, { duration: holdDuration });

    // Exit
    if (window.__buildExit) tl.add(window.__buildExit());

    return tl;
  };
</script>
