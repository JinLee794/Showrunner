<div class="scene chart-line">
  {{#if data.title}}
  <h2 class="scene-title chart-line__title">{{data.title}}</h2>
  {{/if}}
  <div class="chart-line__container">
    <div class="chart-line__svg-wrap" id="chart-line-svg"></div>
    {{#if data.series}}
    <div class="chart-line__legend">
      {{#each data.series}}
      <div class="chart-line__legend-item">
        <span class="chart-line__legend-swatch" style="background:{{this.color}}"></span>
        <span>{{this.label}}</span>
      </div>
      {{/each}}
    </div>
    {{/if}}
  </div>
  {{#if data.annotation}}
  <p class="chart-line__annotation">{{data.annotation}}</p>
  {{/if}}
</div>

<script id="line-data" type="application/json">{{{data.chartDataJSON}}}</script>

<style>
  .chart-line {
    align-items: flex-start;
    padding: calc(var(--spacing-unit) * 6) calc(var(--spacing-unit) * 8);
  }

  .chart-line__title {
    margin-bottom: calc(var(--spacing-unit) * 2);
  }

  .chart-line__container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing-unit) * 2);
    background: var(--glass-bg, var(--bg-secondary));
    backdrop-filter: blur(var(--glass-blur, 16px));
    -webkit-backdrop-filter: blur(var(--glass-blur, 16px));
    border: 1px solid var(--glass-border, rgba(255,255,255,0.06));
    border-radius: var(--border-radius);
    padding: calc(var(--spacing-unit) * 3) calc(var(--spacing-unit) * 4);
    box-shadow: var(--shadow-card);
  }

  .chart-line__svg-wrap {
    width: 100%;
    height: 380px;
  }

  .chart-line__svg-wrap svg {
    width: 100%;
    height: 100%;
  }

  .chart-line__svg-wrap .axis-x text,
  .chart-line__svg-wrap .axis-y text {
    font-family: var(--font-body);
    font-size: 13px;
    fill: var(--text-secondary);
  }

  .chart-line__svg-wrap .axis-x path,
  .chart-line__svg-wrap .axis-y path,
  .chart-line__svg-wrap .axis-x line,
  .chart-line__svg-wrap .axis-y line {
    stroke: var(--bg-tertiary);
  }

  .chart-line__svg-wrap .grid-line {
    stroke: var(--bg-tertiary);
    stroke-opacity: 0.4;
    stroke-dasharray: 4 4;
  }

  .chart-line__svg-wrap .data-dot {
    stroke-width: 2;
  }

  .chart-line__svg-wrap .dot-label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    fill: var(--text-primary);
    text-anchor: middle;
  }

  .chart-line__legend {
    display: flex;
    justify-content: center;
    gap: calc(var(--spacing-unit) * 4);
    padding-top: calc(var(--spacing-unit) * 1);
  }

  .chart-line__legend-item {
    display: flex;
    align-items: center;
    gap: calc(var(--spacing-unit) * 1);
    font-size: 0.95rem;
    color: var(--text-secondary);
  }

  .chart-line__legend-swatch {
    width: 20px;
    height: 3px;
    border-radius: 2px;
  }

  .chart-line__annotation {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    margin-top: calc(var(--spacing-unit) * 1);
  }
</style>

<script>
  (function() {
    var dataEl = document.getElementById('line-data');
    var chartData = dataEl ? JSON.parse(dataEl.textContent || '{}') : {};
    var labels = chartData.labels || [];
    var series = chartData.series || [];

    var container = document.getElementById('chart-line-svg');
    var margin = { top: 30, right: 30, bottom: 50, left: 60 };
    var width = (container.offsetWidth || 900) - margin.left - margin.right;
    var height = (container.offsetHeight || 380) - margin.top - margin.bottom;

    var svg = d3.select('#chart-line-svg')
      .append('svg')
      .attr('viewBox', '0 0 ' + (width + margin.left + margin.right) + ' ' + (height + margin.top + margin.bottom))
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .append('g')
      .attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    var defs = svg.append('defs');

    // Glow filter
    var filter = defs.append('filter').attr('id', 'line-glow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
    filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
    var merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'coloredBlur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Area gradients per series
    var palette = ['#4fc3f7', '#a78bfa', '#f39c12', '#2ecc71', '#e74c3c'];
    series.forEach(function(s, i) {
      if (!s.color) s.color = palette[i % palette.length];

      var grad = defs.append('linearGradient')
        .attr('id', 'area-grad-' + i)
        .attr('x1', '0').attr('y1', '0')
        .attr('x2', '0').attr('y2', '1');
      grad.append('stop').attr('offset', '0%').attr('stop-color', s.color).attr('stop-opacity', 0.3);
      grad.append('stop').attr('offset', '100%').attr('stop-color', s.color).attr('stop-opacity', 0.02);
    });

    // Scales
    var x = d3.scalePoint().domain(labels).range([0, width]).padding(0.5);
    var allVals = series.flatMap(function(s) { return s.values; });
    var yMax = d3.max(allVals) || 1;
    var y = d3.scaleLinear().domain([0, yMax * 1.15]).range([height, 0]).nice();

    // Grid
    svg.selectAll('.grid-line')
      .data(y.ticks(5))
      .enter().append('line')
      .attr('class', 'grid-line')
      .attr('x1', 0).attr('x2', width)
      .attr('y1', function(d) { return y(d); })
      .attr('y2', function(d) { return y(d); });

    // X axis
    svg.append('g')
      .attr('class', 'axis-x')
      .attr('transform', 'translate(0,' + height + ')')
      .call(d3.axisBottom(x).tickSize(0).tickPadding(14))
      .select('.domain').remove();

    // Y axis
    svg.append('g')
      .attr('class', 'axis-y')
      .call(d3.axisLeft(y).ticks(5).tickSize(-6).tickPadding(10)
        .tickFormat(function(d) { return d >= 1000 ? (d / 1000) + 'k' : String(d); }))
      .select('.domain').remove();

    // Line + area per series
    var lineGen = d3.line()
      .x(function(d, i) { return x(labels[i]); })
      .y(function(d) { return y(d); })
      .curve(d3.curveMonotoneX);

    var areaGen = d3.area()
      .x(function(d, i) { return x(labels[i]); })
      .y0(height)
      .y1(function(d) { return y(d); })
      .curve(d3.curveMonotoneX);

    series.forEach(function(s, si) {
      // Area fill
      svg.append('path')
        .attr('class', 'line-area')
        .attr('d', areaGen(s.values))
        .attr('fill', 'url(#area-grad-' + si + ')');

      // Line path
      var path = svg.append('path')
        .attr('class', 'line-path')
        .attr('d', lineGen(s.values))
        .attr('fill', 'none')
        .attr('stroke', s.color)
        .attr('stroke-width', 3)
        .attr('stroke-linecap', 'round')
        .attr('stroke-linejoin', 'round')
        .attr('filter', 'url(#line-glow)');

      // Store total length for animation
      var totalLen = path.node().getTotalLength();
      path.attr('stroke-dasharray', totalLen)
        .attr('stroke-dashoffset', totalLen);

      // Data dots
      s.values.forEach(function(val, vi) {
        svg.append('circle')
          .attr('class', 'data-dot data-dot-' + si)
          .attr('cx', x(labels[vi]))
          .attr('cy', y(val))
          .attr('r', 5)
          .attr('fill', s.color)
          .attr('stroke', 'var(--bg-primary)')
          .attr('stroke-width', 2)
          .attr('opacity', 0);

        // Dot label
        svg.append('text')
          .attr('class', 'dot-label dot-label-' + si)
          .attr('x', x(labels[vi]))
          .attr('y', y(val) - 14)
          .text(val)
          .attr('fill', s.color)
          .attr('opacity', 0);
      });
    });

    window.__buildTimeline = function() {
      var tl = gsap.timeline({ paused: true });

      tl.from('.chart-line__container', {
        y: 20, opacity: 0, scale: 0.98,
        duration: 0.4, ease: 'power2.out'
      });

      tl.from('.chart-line__title', {
        y: 30, opacity: 0,
        duration: 0.4, ease: 'back.out(1.7)'
      }, 0);

      tl.from('.grid-line', {
        opacity: 0, duration: 0.3, stagger: 0.04, ease: 'power2.out'
      }, '-=0.2');

      tl.from('.axis-x text', {
        opacity: 0, y: 10, duration: 0.3, stagger: 0.05, ease: 'power2.out'
      }, '-=0.2');

      tl.from('.axis-y text', {
        opacity: 0, x: -10, duration: 0.3, stagger: 0.04, ease: 'power2.out'
      }, '<');

      // Animate line drawing
      var paths = document.querySelectorAll('.line-path');
      paths.forEach(function(path) {
        tl.to(path, {
          strokeDashoffset: 0,
          duration: 1.5,
          ease: 'power2.inOut'
        }, '-=0.2');
      });

      // Area fade in
      tl.from('.line-area', {
        opacity: 0, duration: 0.5, stagger: 0.1, ease: 'power2.out'
      }, '-=0.7');

      // Data dots pop in
      series.forEach(function(s, si) {
        tl.from('.data-dot-' + si, {
          scale: 0, opacity: 0, duration: 0.3, stagger: 0.04, ease: 'back.out(2)'
        }, '-=0.3');

        tl.to('.dot-label-' + si, {
          opacity: 1, duration: 0.2, stagger: 0.04, ease: 'power2.out'
        }, '-=0.2');
      });

      tl.from('.chart-line__legend-item', {
        opacity: 0, x: -10, duration: 0.3, stagger: 0.1, ease: 'power2.out'
      }, '-=0.2');

      var annotation = document.querySelector('.chart-line__annotation');
      if (annotation) {
        tl.from(annotation, { opacity: 0, duration: 0.3, ease: 'power2.out' }, '-=0.1');
      }

      tl.to({}, { duration: 1.5 });
      if (window.__buildExit) tl.add(window.__buildExit());
      return tl;
    };
  })();
</script>
