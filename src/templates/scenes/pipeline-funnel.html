<div class="scene pipeline-funnel">
  <h2 class="scene-title pipeline-funnel__title">{{#if data.title}}{{data.title}}{{else}}Pipeline Overview{{/if}}</h2>
  <div class="pipeline-funnel__stages">
    {{#each data.stages}}
    <div class="pipeline-funnel__stage {{#if this.highlight}}pipeline-funnel__stage--highlight{{/if}}">
      <div class="pipeline-funnel__label">{{this.name}}</div>
      <div class="pipeline-funnel__bar-track">
        <div class="pipeline-funnel__bar" data-width="{{this.widthPercent}}"></div>
        <div class="pipeline-funnel__bar-shimmer"></div>
      </div>
      <div class="pipeline-funnel__meta">
        <span class="pipeline-funnel__count" data-target="{{this.count}}">0</span>
        <span class="pipeline-funnel__value">{{this.value}}</span>
      </div>
    </div>
    {{/each}}
  </div>
</div>

<style>
  .pipeline-funnel {
    align-items: flex-start;
    padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 12);
    gap: 0;
  }

  .pipeline-funnel__title {
    align-self: flex-start;
    margin-bottom: calc(var(--spacing-unit) * 5);
  }

  .pipeline-funnel__stages {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing-unit) * 3);
  }

  .pipeline-funnel__stage {
    display: grid;
    grid-template-columns: 180px 1fr 200px;
    align-items: center;
    gap: calc(var(--spacing-unit) * 3);
  }

  .pipeline-funnel__label {
    font-size: 1.1rem;
    color: var(--text-secondary);
    text-align: right;
    font-weight: 500;
  }

  .pipeline-funnel__bar-track {
    width: 100%;
    height: 44px;
    background: var(--glass-bg, var(--bg-tertiary));
    backdrop-filter: blur(var(--glass-blur, 16px));
    -webkit-backdrop-filter: blur(var(--glass-blur, 16px));
    border-radius: var(--border-radius-sm);
    overflow: hidden;
    border: 1px solid var(--glass-border, rgba(255,255,255,0.04));
    position: relative;
  }

  .pipeline-funnel__bar {
    height: 100%;
    background: var(--accent-gradient);
    border-radius: var(--border-radius-sm);
    transform-origin: left center;
    position: relative;
  }

  .pipeline-funnel__bar-shimmer {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,255,255,0.08) 50%,
      transparent 100%
    );
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
    pointer-events: none;
  }

  .pipeline-funnel__stage--highlight .pipeline-funnel__bar {
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .pipeline-funnel__meta {
    display: flex;
    gap: calc(var(--spacing-unit) * 2);
    align-items: baseline;
  }

  .pipeline-funnel__count {
    font-size: 1.6rem;
    font-weight: 700;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: var(--font-mono);
  }

  .pipeline-funnel__value {
    font-size: 1rem;
    color: var(--text-secondary);
  }
</style>

<script>
  window.__buildTimeline = function() {
    const tl = gsap.timeline({ paused: true });

    // Title entrance
    tl.from('.pipeline-funnel__title', {
      y: 30,
      opacity: 0,
      duration: 0.4,
      ease: 'back.out(1.7)'
    });

    // Set bar widths from data attributes
    document.querySelectorAll('.pipeline-funnel__bar').forEach(function(bar) {
      var w = bar.getAttribute('data-width') || '50';
      bar.style.width = w + '%';
    });

    // Bars grow left-to-right
    tl.from('.pipeline-funnel__bar', {
      scaleX: 0,
      duration: 0.7,
      stagger: 0.1,
      ease: 'power3.out'
    }, '-=0.1');

    // Labels fade in alongside bars
    tl.from('.pipeline-funnel__label', {
      opacity: 0,
      x: -15,
      duration: 0.35,
      stagger: 0.08,
      ease: 'power2.out'
    }, '<');

    // Count-up animation for numbers
    var counts = document.querySelectorAll('.pipeline-funnel__count');
    var countStart = Math.max(0, tl.duration() - 0.5);
    counts.forEach(function(el, i) {
      var target = parseInt(el.getAttribute('data-target') || '0', 10);
      var obj = { val: 0 };
      tl.to(obj, {
        val: target,
        duration: 1.0,
        ease: 'power2.out',
        onUpdate: function() {
          el.textContent = Math.round(obj.val).toLocaleString();
        }
      }, countStart + i * 0.08);
    });

    // Values fade in
    tl.from('.pipeline-funnel__value', {
      opacity: 0,
      duration: 0.3,
      stagger: 0.08,
      ease: 'power2.out'
    }, '-=0.6');

    // Highlight pulse for highlighted stages
    var highlighted = document.querySelectorAll('.pipeline-funnel__stage--highlight .pipeline-funnel__bar');
    if (highlighted.length > 0) {
      tl.to(highlighted, {
        boxShadow: '0 0 30px var(--accent-glow)',
        duration: 0.3,
        ease: 'power2.inOut',
        yoyo: true,
        repeat: 1
      });
    }

    // Hold
    tl.to({}, { duration: 0.3 });

    return tl;
  };
</script>
