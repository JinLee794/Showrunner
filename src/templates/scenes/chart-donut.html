<div class="scene chart-donut">
  {{#if data.title}}
  <h2 class="scene-title chart-donut__title">{{data.title}}</h2>
  {{/if}}
  <div class="chart-donut__layout">
    <div class="chart-donut__svg-wrap" id="chart-donut-svg"></div>
    <div class="chart-donut__legend" id="chart-donut-legend"></div>
  </div>
  {{#if data.annotation}}
  <p class="chart-donut__annotation">{{data.annotation}}</p>
  {{/if}}
</div>

<script id="donut-data" type="application/json">{{{data.chartDataJSON}}}</script>

<style>
  .chart-donut {
    padding: calc(var(--spacing-unit) * 6) calc(var(--spacing-unit) * 8);
  }

  .chart-donut__title {
    margin-bottom: calc(var(--spacing-unit) * 3);
    align-self: center;
  }

  .chart-donut__layout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: calc(var(--spacing-unit) * 8);
    width: 100%;
  }

  .chart-donut__svg-wrap {
    width: 420px;
    height: 420px;
    flex-shrink: 0;
  }

  .chart-donut__svg-wrap svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .chart-donut__center-total {
    font-family: var(--font-mono);
    font-size: 42px;
    font-weight: 700;
    fill: var(--text-primary);
    text-anchor: middle;
    dominant-baseline: central;
  }

  .chart-donut__center-label {
    font-family: var(--font-body);
    font-size: 14px;
    fill: var(--text-muted);
    text-anchor: middle;
    dominant-baseline: central;
  }

  .chart-donut__legend {
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing-unit) * 2.5);
  }

  .chart-donut__legend-item {
    display: flex;
    align-items: center;
    gap: calc(var(--spacing-unit) * 2);
  }

  .chart-donut__legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .chart-donut__legend-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chart-donut__legend-name {
    font-size: 1rem;
    color: var(--text-primary);
    font-weight: 500;
  }

  .chart-donut__legend-value {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .chart-donut__annotation {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    margin-top: calc(var(--spacing-unit) * 2);
  }
</style>

<script>
  (function() {
    var dataEl = document.getElementById('donut-data');
    var chartData = dataEl ? JSON.parse(dataEl.textContent || '{}') : {};
    var segments = chartData.segments || [];

    var size = 420;
    var outerRadius = size / 2 - 20;
    var innerRadius = outerRadius * 0.62;

    var svg = d3.select('#chart-donut-svg')
      .append('svg')
      .attr('viewBox', '0 0 ' + size + ' ' + size)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .append('g')
      .attr('transform', 'translate(' + size / 2 + ',' + size / 2 + ')');

    var defs = svg.append('defs');

    // Drop shadow filter
    var filter = defs.append('filter').attr('id', 'donut-shadow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%');
    filter.append('feGaussianBlur').attr('stdDeviation', '6').attr('in', 'SourceAlpha').attr('result', 'blur');
    filter.append('feOffset').attr('dx', '0').attr('dy', '2').attr('result', 'offsetBlur');
    var merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'offsetBlur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Default palette
    var palette = ['#4fc3f7', '#a78bfa', '#f39c12', '#2ecc71', '#e74c3c', '#1abc9c', '#e91e63', '#00bcd4'];

    segments.forEach(function(seg, i) {
      if (!seg.color) seg.color = palette[i % palette.length];

      var grad = defs.append('linearGradient')
        .attr('id', 'donut-grad-' + i)
        .attr('x1', '0').attr('y1', '0').attr('x2', '1').attr('y2', '1');
      grad.append('stop').attr('offset', '0%').attr('stop-color', seg.color).attr('stop-opacity', 1);
      grad.append('stop').attr('offset', '100%').attr('stop-color', seg.color).attr('stop-opacity', 0.65);
    });

    var pie = d3.pie().value(function(d) { return d.value; }).sort(null).padAngle(0.03);
    var arc = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius).cornerRadius(5);
    var arcHover = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius + 6).cornerRadius(5);

    var arcs = svg.selectAll('.donut-arc')
      .data(pie(segments))
      .enter().append('path')
      .attr('class', 'donut-arc')
      .attr('d', arc)
      .attr('fill', function(d, i) { return 'url(#donut-grad-' + i + ')'; })
      .attr('filter', 'url(#donut-shadow)');

    // Center text
    var total = segments.reduce(function(s, seg) { return s + seg.value; }, 0);
    svg.append('text')
      .attr('class', 'chart-donut__center-total')
      .attr('dy', '-0.15em')
      .text('0');

    if (chartData.centerLabel) {
      svg.append('text')
        .attr('class', 'chart-donut__center-label')
        .attr('dy', '1.6em')
        .text(chartData.centerLabel);
    }

    // Build legend
    var legend = d3.select('#chart-donut-legend');
    segments.forEach(function(seg, i) {
      var item = legend.append('div').attr('class', 'chart-donut__legend-item');
      item.append('div').attr('class', 'chart-donut__legend-swatch').style('background', seg.color);
      var info = item.append('div').attr('class', 'chart-donut__legend-info');
      info.append('div').attr('class', 'chart-donut__legend-name').text(seg.label);
      info.append('div').attr('class', 'chart-donut__legend-value')
        .text(seg.value.toLocaleString() + (seg.unit ? ' ' + seg.unit : ''));
    });

    window.__buildTimeline = function() {
      var tl = gsap.timeline({ paused: true });

      tl.from('.chart-donut__title', {
        y: 30, opacity: 0, duration: 0.4, ease: 'back.out(1.7)'
      });

      // Arcs grow from zero angle — we animate strokeDashoffset-like via attrTween
      // Simpler: scale each arc from center
      arcs.each(function() {
        this.style.transformOrigin = 'center center';
        this.style.transformBox = 'fill-box';
      });

      tl.from('.donut-arc', {
        scale: 0, opacity: 0, duration: 0.6, stagger: 0.08, ease: 'back.out(1.3)'
      }, '-=0.1');

      // Count up center total
      var centerText = document.querySelector('.chart-donut__center-total');
      if (centerText) {
        var obj = { val: 0 };
        tl.to(obj, {
          val: total, duration: 0.8, ease: 'power2.out',
          onUpdate: function() {
            centerText.textContent = Math.round(obj.val).toLocaleString();
          }
        }, '-=0.4');
      }

      var centerLabel = document.querySelector('.chart-donut__center-label');
      if (centerLabel) {
        tl.from(centerLabel, { opacity: 0, duration: 0.3, ease: 'power2.out' }, '-=0.3');
      }

      tl.from('.chart-donut__legend-item', {
        x: 20, opacity: 0, duration: 0.35, stagger: 0.08, ease: 'back.out(1.2)'
      }, '-=0.3');

      var annotation = document.querySelector('.chart-donut__annotation');
      if (annotation) {
        tl.from(annotation, { opacity: 0, duration: 0.3, ease: 'power2.out' }, '-=0.1');
      }

      tl.to({}, { duration: 0.3 });
      return tl;
    };
  })();
</script>
