<div class="scene chart-bar">
  {{#if data.title}}
  <h2 class="scene-title chart-bar__title">{{data.title}}</h2>
  {{/if}}
  <div class="chart-bar__container">
    <div class="chart-bar__svg-wrap" id="chart-bar-svg"></div>
    {{#if data.datasets}}
    <div class="chart-bar__legend">
      {{#each data.datasets}}
      <div class="chart-bar__legend-item">
        <span class="chart-bar__legend-swatch" style="background:{{this.color}}"></span>
        <span>{{this.label}}</span>
      </div>
      {{/each}}
    </div>
    {{/if}}
  </div>
  {{#if data.annotation}}
  <p class="chart-bar__annotation">{{data.annotation}}</p>
  {{/if}}
</div>

<!-- Inject data for D3 -->
<script id="chart-data" type="application/json">{{{data.chartDataJSON}}}</script>

<style>
  .chart-bar {
    align-items: flex-start;
    padding: calc(var(--spacing-unit) * 6) calc(var(--spacing-unit) * 8);
  }

  .chart-bar__title {
    margin-bottom: calc(var(--spacing-unit) * 2);
  }

  .chart-bar__container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing-unit) * 2);
    background: var(--glass-bg, var(--bg-secondary));
    backdrop-filter: blur(var(--glass-blur, 16px));
    -webkit-backdrop-filter: blur(var(--glass-blur, 16px));
    border: 1px solid var(--glass-border, rgba(255,255,255,0.06));
    border-radius: var(--border-radius);
    padding: calc(var(--spacing-unit) * 3) calc(var(--spacing-unit) * 4);
    box-shadow: var(--shadow-card);
  }

  .chart-bar__svg-wrap {
    width: 100%;
    height: 400px;
  }

  .chart-bar__svg-wrap svg {
    width: 100%;
    height: 100%;
  }

  .chart-bar__svg-wrap .axis-x text,
  .chart-bar__svg-wrap .axis-y text {
    font-family: var(--font-body);
    font-size: 13px;
    fill: var(--text-secondary);
  }

  .chart-bar__svg-wrap .axis-x path,
  .chart-bar__svg-wrap .axis-y path,
  .chart-bar__svg-wrap .axis-x line,
  .chart-bar__svg-wrap .axis-y line {
    stroke: var(--bg-tertiary);
  }

  .chart-bar__svg-wrap .grid-line {
    stroke: var(--bg-tertiary);
    stroke-opacity: 0.4;
    stroke-dasharray: 4 4;
  }

  .chart-bar__svg-wrap .bar-value-label {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    fill: var(--text-primary);
    text-anchor: middle;
  }

  .chart-bar__legend {
    display: flex;
    justify-content: center;
    gap: calc(var(--spacing-unit) * 4);
    padding-top: calc(var(--spacing-unit) * 1);
  }

  .chart-bar__legend-item {
    display: flex;
    align-items: center;
    gap: calc(var(--spacing-unit) * 1);
    font-size: 0.95rem;
    color: var(--text-secondary);
  }

  .chart-bar__legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }

  .chart-bar__annotation {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    margin-top: calc(var(--spacing-unit) * 1);
  }
</style>

<script>
  (function() {
    var dataEl = document.getElementById('chart-data');
    var chartData = dataEl ? JSON.parse(dataEl.textContent || '{}') : {};
    var labels = chartData.labels || [];
    var datasets = chartData.datasets || [];
    var anim = window.__anim || {};
    var stagger = anim.stagger || 0.08;

    var container = document.getElementById('chart-bar-svg');
    var margin = { top: 30, right: 30, bottom: 50, left: 60 };
    var outerW = (container.offsetWidth || 1026);
    var outerH = (container.offsetHeight || 400);
    var width = outerW - margin.left - margin.right;
    var height = outerH - margin.top - margin.bottom;

    var svg = d3.select('#chart-bar-svg')
      .append('svg')
      .attr('viewBox', '0 0 ' + outerW + ' ' + outerH)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .append('g')
      .attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    var defs = svg.append('defs');

    // Per-dataset bar gradients
    var palette = ['#4fc3f7', '#a78bfa', '#f39c12', '#2ecc71', '#e74c3c', '#1abc9c', '#e91e63', '#00bcd4'];
    datasets.forEach(function(ds, i) {
      if (!ds.color) ds.color = palette[i % palette.length];
      var grad = defs.append('linearGradient')
        .attr('id', 'bar-grad-' + i)
        .attr('x1', '0').attr('y1', '0')
        .attr('x2', '0').attr('y2', '1');
      grad.append('stop').attr('offset', '0%').attr('stop-color', ds.color).attr('stop-opacity', 1);
      grad.append('stop').attr('offset', '100%').attr('stop-color', ds.color).attr('stop-opacity', 0.6);
    });

    // Drop shadow for bars
    var filter = defs.append('filter').attr('id', 'bar-shadow')
      .attr('x', '-10%').attr('y', '-10%').attr('width', '120%').attr('height', '130%');
    filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('in', 'SourceAlpha').attr('result', 'blur');
    filter.append('feOffset').attr('dx', '0').attr('dy', '2').attr('result', 'offsetBlur');
    var merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'offsetBlur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Scales
    var x0 = d3.scaleBand().domain(labels).range([0, width]).padding(0.3);
    var x1 = d3.scaleBand().domain(datasets.map(function(_, i) { return i; })).range([0, x0.bandwidth()]).padding(0.08);

    var allVals = datasets.flatMap(function(ds) { return ds.values; });
    var yMax = d3.max(allVals) || 1;
    var y = d3.scaleLinear().domain([0, yMax * 1.12]).range([height, 0]).nice();

    // Grid lines
    svg.selectAll('.grid-line')
      .data(y.ticks(5))
      .enter().append('line')
      .attr('class', 'grid-line')
      .attr('x1', 0).attr('x2', width)
      .attr('y1', function(d) { return y(d); })
      .attr('y2', function(d) { return y(d); });

    // X axis
    svg.append('g')
      .attr('class', 'axis-x')
      .attr('transform', 'translate(0,' + height + ')')
      .call(d3.axisBottom(x0).tickSize(0).tickPadding(14))
      .select('.domain').remove();

    // Y axis
    svg.append('g')
      .attr('class', 'axis-y')
      .call(d3.axisLeft(y).ticks(5).tickSize(-6).tickPadding(10)
        .tickFormat(function(d) { return d >= 1000 ? (d / 1000) + 'k' : String(d); }))
      .select('.domain').remove();

    // Create bars — start at baseline (height = 0) for animation
    var barRects = [];
    var barValues = [];
    labels.forEach(function(label, li) {
      datasets.forEach(function(ds, di) {
        var val = ds.values[li] || 0;
        var targetY = y(val);
        var targetH = height - targetY;
        var barX = x0(label) + x1(di);

        // Bar rect — starts at baseline
        var rect = svg.append('rect')
          .attr('class', 'bar-rect bar-rect-' + li + '-' + di)
          .attr('x', barX)
          .attr('y', height)
          .attr('width', x1.bandwidth())
          .attr('height', 0)
          .attr('rx', 3)
          .attr('ry', 3)
          .attr('fill', 'url(#bar-grad-' + di + ')')
          .attr('filter', 'url(#bar-shadow)');

        barRects.push({
          node: rect.node(),
          targetY: targetY,
          targetH: targetH,
          groupIdx: li,
          datasetIdx: di
        });

        // Value label above bar — starts hidden
        var text = svg.append('text')
          .attr('class', 'bar-value-label bar-value-label-' + li + '-' + di)
          .attr('x', barX + x1.bandwidth() / 2)
          .attr('y', targetY - 8)
          .attr('opacity', 0)
          .text(val);

        barValues.push({
          node: text.node(),
          val: val,
          groupIdx: li,
          datasetIdx: di
        });
      });
    });

    window.__buildTimeline = function() {
      var tl = gsap.timeline({ paused: true });

      // Container slides up
      tl.from('.chart-bar__container', {
        y: 20, opacity: 0, scale: 0.98,
        duration: 0.4, ease: 'power2.out'
      });

      // Title entrance
      tl.from('.chart-bar__title', {
        y: 30, opacity: 0,
        duration: 0.4, ease: 'back.out(1.7)'
      }, 0);

      // Grid lines fade in
      tl.from('.grid-line', {
        opacity: 0, duration: 0.3, stagger: 0.04, ease: 'power2.out'
      }, '-=0.2');

      // Axis labels
      tl.from('.axis-x text', {
        opacity: 0, y: 10, duration: 0.3, stagger: 0.05, ease: 'power2.out'
      }, '-=0.2');

      tl.from('.axis-y text', {
        opacity: 0, x: -10, duration: 0.3, stagger: 0.04, ease: 'power2.out'
      }, '<');

      // === HERO ANIMATION: bars grow from baseline ===
      tl.addLabel('barGrow');
      barRects.forEach(function(bar, i) {
        // Animate SVG y and height attrs: y goes from baseline to target,
        // height goes from 0 to target. GSAP can animate SVG attributes via attr plugin.
        tl.to(bar.node, {
          attr: { y: bar.targetY, height: bar.targetH },
          duration: 0.8,
          ease: anim.ease || 'power2.out'
        }, 'barGrow+=' + (stagger * i).toFixed(3));
      });

      // Value labels fade in and count up in sync with their bars
      barValues.forEach(function(bv, i) {
        var obj = { val: 0 };
        var isInt = Number.isInteger(bv.val);
        tl.to(bv.node, { opacity: 1, duration: 0.1 },
          'barGrow+=' + (stagger * i + 0.3).toFixed(3));
        tl.to(obj, {
          val: bv.val,
          duration: 0.5,
          ease: 'power2.out',
          onUpdate: function() {
            bv.node.textContent = isInt ? Math.round(obj.val) : obj.val.toFixed(1);
          }
        }, 'barGrow+=' + (stagger * i + 0.3).toFixed(3));
      });

      // Legend
      tl.from('.chart-bar__legend-item', {
        opacity: 0, x: -10, duration: 0.3, stagger: 0.1, ease: 'power2.out'
      }, '-=0.2');

      var annotation = document.querySelector('.chart-bar__annotation');
      if (annotation) {
        tl.from(annotation, {
          opacity: 0, duration: 0.3, ease: 'power2.out'
        }, '-=0.1');
      }

      // Hold
      tl.to({}, { duration: 0.3 });

      if (window.__buildExit) tl.add(window.__buildExit());

      return tl;
    };
  })();
</script>
