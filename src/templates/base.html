<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{width}}, height={{height}}">
  <style>{{{themeCSS}}}</style>
  <style>
    html, body {
      width: {{width}}px;
      height: {{height}}px;
      overflow: hidden;
    }
  </style>
  <script>{{{gsapBundle}}}</script>
  <script>{{{d3Bundle}}}</script>
  {{{animRuntime}}}
</head>
<body>
  {{{sceneContent}}}
  {{#if brandingLogo}}
  <img class="global-watermark" src="{{{brandingLogo}}}" alt="" />
  <style>
    .global-watermark {
      position: fixed;
      bottom: 24px;
      right: 32px;
      max-width: 120px;
      max-height: 48px;
      object-fit: contain;
      opacity: 0.5;
      pointer-events: none;
      z-index: 9999;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }
  </style>
  {{/if}}
  <script>
    // Expose seek function — renderer calls this each frame
    // Scene scripts set window.__buildTimeline which returns the GSAP timeline
    if (typeof window.__buildTimeline === 'function') {
      const tl = window.__buildTimeline();
      // Apply speed multiplier from animation overrides
      if (window.__anim && window.__anim.speed && window.__anim.speed !== 1) {
        tl.timeScale(window.__anim.speed);
      }
      window.__seek = function(progress) {
        tl.progress(progress);
      };
      window.__timelineReady = true;
    }
  </script>
</body>
</html>
